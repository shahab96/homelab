replicaCount: 1
image:
  runAsNonRoot: true
nodeSelector:
  nodepool: worker
strategy:
  type: Recreate
storage:
  disk:
    persistence:
      enabled: true
      accessMode: ReadWriteOnce
      size: 16Gi
      storageClass: longhorn
configEnvVars:
  - name: ATHENS_DOWNLOAD_MODE
    value: "sync"
upstreamProxy:
  enabled: true
  url: "https://proxy.golang.org"
