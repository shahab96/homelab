providers:
  kubernetesCRD:
    allowCrossNamespace: true
deployment:
  replicas: 1
  podLabels:
    app: traefik
nodeSelector:
  nodepool: worker
service:
  spec:
    externalTrafficPolicy: Local
topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: "kubernetes.io/hostname"
    whenUnsatisfiable: "DoNotSchedule"
    labelSelector:
      matchLabels:
        app: traefik
additionalArguments:
  - "--entryPoints.ssh.address=:2222/tcp"
  - "--entryPoints.minecraft-atm9.address=:25565/tcp"
  - "--entryPoints.minecraft-tfg.address=:25566/tcp"
  - "--entryPoints.websecure.transport.respondingTimeouts.readTimeout=300s"
  - "--entryPoints.websecure.transport.respondingTimeouts.writeTimeout=300s"
ports:
  ssh:
    port: 2222
    exposedPort: 2222
    expose:
      default: true
    protocol: TCP
  minecraft-atm9:
    port: 25565
    exposedPort: 25565
    expose:
      default: true
    protocol: TCP
  minecraft-tfg:
    port: 25566
    exposedPort: 25566
    expose:
      default: true
    protocol: TCP
