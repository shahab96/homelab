repositories:
  - name: longhorn
    url: https://charts.longhorn.io
  - name: metallb
    url: https://metallb.github.io/metallb
  - name: mojo2600
    url: https://mojo2600.github.io/pihole-kubernetes
  - name: ingress-nginx
    url: https://kubernetes.github.io/ingress-nginx
  - name: bitnami
    url: https://charts.bitnami.com/bitnami
  - name: jetstack
    url: https://charts.jetstack.io
  - name: prometheus-community
    url: https://prometheus-community.github.io/helm-charts
  - name: authentik
    url: https://charts.goauthentik.io
---
releases:
  # Distributed Storage
  - name: longhorn
    namespace: longhorn-system
    chart: longhorn/longhorn
    version: 1.7.0
    values:
      - ./values/longhorn.values.yaml

  # Load Balancer
  - name: metallb
    namespace: metallb-system
    chart: metallb/metallb
    version: 0.14.8

  # pihole
  - name: pihole
    namespace: pihole-system
    chart: mojo2600/pihole
    version: 2.26.1
    values:
      - ./values/pihole.values.yaml

  # Ingress for local network
  - name: ingress-nginx-internal
    namespace: nginx-system
    chart: ingress-nginx/ingress-nginx
    version: 4.10.1
    values:
      - ./values/nginx-internal.values.yaml

  # Automatic DNS for pihole
  - name: externaldns-pihole
    namespace: pihole-system
    chart: bitnami/external-dns
    version: 8.3.4
    values:
      - ./values/externaldns.values.yaml

  # Memcached
  - name: memcached
    namespace: memcached-system
    chart: bitnami/memcached
    version: 7.4.16
    values:
      - ./values/memcached.values.yaml

  # Cert Manager
  - name: cert-manager
    namespace: cert-manager
    chart: jetstack/cert-manager
    version: 1.15.3
    values:
      - ./values/cert-manager.values.yaml

  # Prometheus Operator
  - name: prometheus-operator
    namespace: prometheus-system
    chart: prometheus-community/kube-prometheus-stack
    version: 62.3.0
    values:
      - ./values/prometheus.values.yaml

  # Redis
  - name: redis
    namespace: redis-system
    chart: bitnami/redis
    version: 20.2.0
    values:
      - ./values/redis.values.yaml

  # Authentik
  - name: authentik
    namespace: authentik-system
    chart: authentik/authentik
    version: 2024.10.5
    values:
      - ./values/authentik.values.yaml
