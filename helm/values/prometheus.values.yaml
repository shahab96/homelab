grafana:
  enabled: true
  ingress:
    enabled: true
    ingressClassName: traefik
    annotations:
      cert-manager.io/cluster-issuer: cloudflare-issuer
      cert-manager.io/acme-challenge-type: dns01
      cert-manager.io/private-key-size: "4096"
    hosts:
      - grafana.dogar.dev
    tls:
      - secretName: grafana-tls
        hosts:
          - grafana.dogar.dev
