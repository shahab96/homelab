ingress:
  ingressClass:
    enabled: true
    isDefaultClass: false
    name: traefik
deployment:
  replicas: 3
  podLabels:
    app: traefik
nodeSelector:
  nodepool: worker
topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: "kubernetes.io/hostname"
    whenUnsatisfiable: "ScheduleAnyway"
    labelSelector:
      matchLabels:
        app: traefik
