---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: shahab-client-cert
  namespace: postgres-system
spec:
  secretName: shahab-client-cert
  usages:
    - client auth
  commonName: shahab
  issuerRef:
    name: postgres-client-ca-issuer
    kind: Issuer
    group: cert-manager.io
