APP_NAME = Forgejo: Beyond coding. We forge.
RUN_MODE = prod

[security]
GLOBAL_TWO_FACTOR_REQUIREMENT = all
INSTALL_LOCK = true

[cors]
ENABLED = true
ALLOW_DOMAIN = https://git.dogar.dev

[repository]
ENABLE_PUSH_CREATE_USER = true
ENABLE_PUSH_CREATE_ORG = true

[server]
PROTOCOL = http
ROOT_URL = https://git.dogar.dev/
SSH_DOMAIN = git.dogar.dev
DOMAIN = git.dogar.dev
DISABLE_SSH = false
SSH_LISTEN_PORT = 2222
SSH_PORT = 2222
SSL_MIN_VERSION = TLSv1.3
LFS_START_SERVER = true
ENABLE_PPROF = false
ENABLE_GZIP = true
HTTP_PORT = 3000

[database]
DB_TYPE = postgres
HOST = postgres-cluster-rw:5432
NAME = forgejo
USER = forgejo
SSL_MODE = verify-full

[cache]
ADAPTER = memory

[session]
PROVIDER = db

[queue]
TYPE = channel

[storage]
STORAGE_TYPE = minio
MINIO_USE_SSL = true
MINIO_BUCKET = forgejo
MINIO_ENDPOINT = blob.dogar.dev:443

[service]
DISABLE_REGISTRATION = true

[indexer]
ISSUE_INDEXER_TYPE = db

[oauth2_client]
ENABLE_AUTO_REGISTRATION = true
UPDATE_AVATAR = true

[openid]
ENABLE_OPENID_SIGNIN = false

[mailer]
ENABLED = true
PROTOCOL = smtp+starttls
SMTP_ADDR = smtp.protonmail.ch
SMTP_PORT = 587
FROM = git@dogar.dev
USER = git@dogar.dev

[picture]
GRAVATAR_SOURCE = gravatar
ENABLE_FEDERATED_AVATAR = true

[metrics]
ENABLED = true

[actions]
ENABLED = true
DEFAULT_ACTIONS_URL = https://code.forgejo.org

[log]
LEVEL = info
MODE = console
